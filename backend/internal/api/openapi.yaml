openapi: 3.0.3
info:
  title: Africa Tourism Platform API
  version: 1.0.0
  description: API documentation for the Africa Tourism Platform backend.
servers:
  - url: http://localhost:8080
tags:
  - name: Health
    description: Service health and readiness
  - name: Auth
    description: Authentication and JWT issuance
  - name: User
    description: User profile and preferences
  - name: Regions (Admin)
    description: Region management (admin only)
  - name: Destinations
    description: Public destination discovery
  - name: Destinations (Admin)
    description: Destination management (admin only)
  - name: Packages
    description: Community packages and reviews
  - name: Chat
    description: Package chat and WebSocket
  - name: Itineraries
    description: Itinerary CRUD and items
  - name: Planner
    description: AI itinerary generation
  - name: Intelligence
    description: Visa and safety intelligence
paths:
  /health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                ok:
                  value:
                    status: ok
                degraded:
                  value:
                    status: degraded
                    message: redis ping failed
                    database: ok
  /api/v1/auth/register:
    post:
      summary: Register user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: user@example.com
              password: StrongPass123
              first_name: Test
              last_name: User
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              example:
                message: User registered successfully
                user_id: 00000000-0000-0000-0000-000000000001
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid request
  /api/v1/auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: user@example.com
              password: StrongPass123
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                user:
                  id: 00000000-0000-0000-0000-000000000001
                  email: user@example.com
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid email or password
  /api/v1/regions:
    get:
      summary: List regions
      tags: [Regions (Admin)]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Region'
              example:
                - region_id: 00000000-0000-0000-0000-000000000010
                  name: East Africa
                  slug: east-africa
                  description: The eastern region
    post:
      summary: Create region
      tags: [Regions (Admin)]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRegionRequest'
            example:
              name: East Africa
              slug: east-africa
              description: The eastern region
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Region'
              example:
                region_id: 00000000-0000-0000-0000-000000000010
                name: East Africa
                slug: east-africa
                description: The eastern region
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 'Access denied: insufficient permissions'
  /api/v1/regions/{id}:
    get:
      summary: Get region by ID
      tags: [Regions (Admin)]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Region'
              example:
                region_id: 00000000-0000-0000-0000-000000000010
                name: East Africa
                slug: east-africa
                description: The eastern region
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Region not found
    put:
      summary: Update region
      tags: [Regions (Admin)]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRegionRequest'
            example:
              name: East Africa Updated
              description: Updated description
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Region'
              example:
                region_id: 00000000-0000-0000-0000-000000000010
                name: East Africa Updated
                slug: east-africa
                description: Updated description
    delete:
      summary: Delete region
      tags: [Regions (Admin)]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Region deleted successfully
  /api/v1/destinations:
    get:
      summary: Search destinations
      tags: [Destinations]
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: region_id
          schema:
            type: string
            format: uuid
        - in: query
          name: country_id
          schema:
            type: string
            format: uuid
        - in: query
          name: price_level
          schema:
            type: integer
        - in: query
          name: season
          schema:
            type: string
        - in: query
          name: tags
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: page_size
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DestinationSearchResponse'
              example:
                data:
                  - destination_id: 00000000-0000-0000-0000-000000000100
                    name: Nairobi
                    slug: nairobi
                    description: Capital city
                    short_description: A vibrant city
                    country_id: 00000000-0000-0000-0000-000000000200
                    region_id: 00000000-0000-0000-0000-000000000010
                    city: Nairobi
                    hero_image_url: https://example.com/nairobi.jpg
                    destination_type: city
                    average_rating: 4.2
                    total_reviews: 120
                    annual_visitors: 1500000
                    best_season: summer
                    price_level: 3
                    is_unesco_site: false
                    is_active: true
                total: 1
                page: 1
    post:
      summary: Create destination
      tags: [Destinations (Admin)]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDestinationRequest'
            example:
              name: Nairobi
              slug: nairobi
              description: Capital city
              short_description: A vibrant city
              country_id: 00000000-0000-0000-0000-000000000200
              region_id: 00000000-0000-0000-0000-000000000010
              city: Nairobi
              latitude: -1.286389
              longitude: 36.817223
              destination_type: city
              hero_image_url: https://example.com/nairobi.jpg
              annual_visitors: 1500000
              best_season: summer
              price_level: 3
              is_unesco_site: false
              is_active: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Destination'
              example:
                destination_id: 00000000-0000-0000-0000-000000000100
                name: Nairobi
                slug: nairobi
                description: Capital city
                short_description: A vibrant city
                country_id: 00000000-0000-0000-0000-000000000200
                region_id: 00000000-0000-0000-0000-000000000010
                city: Nairobi
                hero_image_url: https://example.com/nairobi.jpg
                destination_type: city
                average_rating: 0
                total_reviews: 0
                annual_visitors: 1500000
                best_season: summer
                price_level: 3
                is_unesco_site: false
                is_active: true
  /api/v1/destinations/{id}:
    get:
      summary: Get destination details
      tags: [Destinations]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Destination'
              example:
                destination_id: 00000000-0000-0000-0000-000000000100
                name: Nairobi
                slug: nairobi
                description: Capital city
                short_description: A vibrant city
                country_id: 00000000-0000-0000-0000-000000000200
                region_id: 00000000-0000-0000-0000-000000000010
                city: Nairobi
                hero_image_url: https://example.com/nairobi.jpg
                destination_type: city
                average_rating: 4.2
                total_reviews: 120
                annual_visitors: 1500000
                best_season: summer
                price_level: 3
                is_unesco_site: false
                is_active: true
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Destination not found
    put:
      summary: Update destination
      tags: [Destinations (Admin)]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDestinationRequest'
            example:
              name: Nairobi Updated
              short_description: Updated description
              price_level: 4
              is_active: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Destination'
              example:
                destination_id: 00000000-0000-0000-0000-000000000100
                name: Nairobi Updated
                slug: nairobi
                description: Capital city
                short_description: Updated description
                country_id: 00000000-0000-0000-0000-000000000200
                region_id: 00000000-0000-0000-0000-000000000010
                city: Nairobi
                hero_image_url: https://example.com/nairobi.jpg
                destination_type: city
                average_rating: 4.2
                total_reviews: 120
                annual_visitors: 1500000
                best_season: summer
                price_level: 4
                is_unesco_site: false
                is_active: true
    delete:
      summary: Delete destination
      tags: [Destinations (Admin)]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Destination deleted successfully
  /api/v1/packages:
    get:
      summary: Get packages feed
      tags: [Packages]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [published, draft, archived, all]
        - in: query
          name: sort_by
          schema:
            type: string
            enum: [rating_avg, price, verified, views]
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: page_size
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackagesFeedResponse'
              example:
                data:
                  - package_id: 00000000-0000-0000-0000-000000000500
                    creator_id: 00000000-0000-0000-0000-000000000001
                    itinerary_id: 00000000-0000-0000-0000-000000000700
                    title: Safari Adventure
                    summary: A 3-day guided safari
                    price: 299.99
                    status: published
                    rating_avg: 4.8
                    reviews_count: 10
                    view_count: 120
                    country: Kenya
                    currency: USD
                    climate_pref: warm
                    is_multi_country: false
                    is_streamer_verified: false
                    streamer_name: ""
                    created_via_ai: false
                    created_at: "2026-03-14T10:00:00Z"
                meta:
                  page: 1
                  page_size: 20
                  total: 1
                  sort_by: rating_avg
                  order: desc
    post:
      summary: Create package
      tags: [Packages]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackageCreateRequest'
            example:
              itinerary_id: 00000000-0000-0000-0000-000000000700
              title: Safari Adventure
              summary: A 3-day guided safari
              price: 299.99
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Package'
              example:
                package_id: 00000000-0000-0000-0000-000000000500
                creator_id: 00000000-0000-0000-0000-000000000001
                itinerary_id: 00000000-0000-0000-0000-000000000700
                title: Safari Adventure
                summary: A 3-day guided safari
                price: 299.99
                status: draft
                rating_avg: 0
                reviews_count: 0
                view_count: 0
                country: Kenya
                currency: USD
                climate_pref: warm
                is_multi_country: false
                is_streamer_verified: false
                streamer_name: ""
                created_via_ai: false
                created_at: "2026-03-14T10:00:00Z"
  /api/v1/packages/{id}:
    get:
      summary: Get package by ID
      tags: [Packages]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Package'
              example:
                package_id: 00000000-0000-0000-0000-000000000500
                creator_id: 00000000-0000-0000-0000-000000000001
                itinerary_id: 00000000-0000-0000-0000-000000000700
                title: Safari Adventure
                summary: A 3-day guided safari
                price: 299.99
                status: published
                rating_avg: 4.8
                reviews_count: 10
                view_count: 121
                country: Kenya
                currency: USD
                climate_pref: warm
                is_multi_country: false
                is_streamer_verified: false
                streamer_name: ""
                created_via_ai: false
                created_at: "2026-03-14T10:00:00Z"
    patch:
      summary: Update package
      tags: [Packages]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackageUpdateRequest'
            example:
              title: Updated Package Title
              summary: Updated summary
              price: 149.5
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Package'
              example:
                package_id: 00000000-0000-0000-0000-000000000500
                creator_id: 00000000-0000-0000-0000-000000000001
                itinerary_id: 00000000-0000-0000-0000-000000000700
                title: Updated Package Title
                summary: Updated summary
                price: 149.5
                status: draft
                rating_avg: 0
                reviews_count: 0
                view_count: 0
                country: Kenya
                currency: USD
                climate_pref: warm
                is_multi_country: false
                is_streamer_verified: false
                streamer_name: ""
                created_via_ai: false
                created_at: "2026-03-14T10:00:00Z"
    delete:
      summary: Archive package
      tags: [Packages]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Package archived successfully
  /api/v1/packages/{id}/publish:
    post:
      summary: Publish package
      tags: [Packages]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Package published successfully
  /api/v1/packages/{id}/status:
    patch:
      summary: Update package status
      tags: [Packages]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackageStatusRequest'
            example:
              status: published
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Status updated successfully
  /api/v1/packages/{id}/reviews:
    get:
      summary: Get package reviews
      tags: [Packages]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PackageReview'
              example:
                - review_id: 00000000-0000-0000-0000-000000000900
                  package_id: 00000000-0000-0000-0000-000000000500
                  user_id: 00000000-0000-0000-0000-000000000001
                  rating: 5
                  comment: Great trip
                  created_at: "2026-03-14T10:00:00Z"
    post:
      summary: Submit package review
      tags: [Packages]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequest'
            example:
              rating: 5
              comment: Great trip
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Review submitted successfully
  /api/v1/packages/{id}/chat:
    get:
      summary: Get package chat history
      tags: [Chat]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatHistoryResponse'
              example:
                data:
                  - chat_id: 00000000-0000-0000-0000-000000001000
                    package_id: 00000000-0000-0000-0000-000000000500
                    user_id: 00000000-0000-0000-0000-000000000001
                    message: Is transport included?
                    created_at: "2026-03-14T10:00:00Z"
                meta:
                  page: 1
                  page_size: 50
                  total: 1
    post:
      summary: Post chat message
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            example:
              message: Is transport included?
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageChat'
              example:
                chat_id: 00000000-0000-0000-0000-000000001000
                package_id: 00000000-0000-0000-0000-000000000500
                user_id: 00000000-0000-0000-0000-000000000001
                message: Is transport included?
                created_at: "2026-03-14T10:00:00Z"
  /api/v1/packages/{id}/ws:
    get:
      summary: WebSocket chat
      description: WebSocket endpoint for package chat. Use a WebSocket client and include Authorization header.
      tags: [Chat]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '101':
          description: Switching protocols
  /api/v1/user/preferences:
    get:
      summary: Get user preferences
      tags: [User]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferencesResponse'
              example:
                data:
                  preference_id: 00000000-0000-0000-0000-000000000300
                  user_id: 00000000-0000-0000-0000-000000000001
                  traveler_type: solo
                  preferred_season: summer
                  budget_range: medium
                  trip_duration: short
                  preferred_activities: [hiking, food]
                  dietary_restrictions: [vegetarian]
                  accessibility_needs: [wheelchair]
    put:
      summary: Update user preferences
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                traveler_type: solo
                preferred_season: summer
                budget_range: medium
                trip_duration: short
                preferred_activities: [hiking, food]
                dietary_restrictions: [vegetarian]
                accessibility_needs: [wheelchair]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Preferences updated
  /api/v1/planner/generate:
    post:
      summary: Generate itinerary using AI
      tags: [Planner]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePlanRequest'
            example:
              destination: Nairobi, Kenya
              duration_days: 3
              budget_level: medium
              vibe_tags: [culture, food]
              group_size: 2
              climate_pref: any
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratePlanResponse'
              example:
                message: Plan generated
                data:
                  title: Nairobi Highlights
                  currency: USD
                  days:
                    - day_num: 1
                      activities:
                        - name: City tour
                          type: culture
                          description: Explore downtown
                          est_cost: 50
                          geo_lat: -1.286389
                          geo_long: 36.817223
  /api/v1/itineraries:
    post:
      summary: Create itinerary
      tags: [Itineraries]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItineraryRequest'
            example:
              title: Test Itinerary
              description: Test itinerary description
              start_date: 2026-03-20
              end_date: 2026-03-23
              items:
                - day_number: 1
                  activity_name: Arrival and check-in
                  activity_description: Check in and rest
                  start_time: 09:00
                  end_time: 12:00
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Itinerary'
              example:
                itinerary_id: 00000000-0000-0000-0000-000000000700
                user_id: 00000000-0000-0000-0000-000000000001
                title: Test Itinerary
                description: Test itinerary description
                items: []
  /api/v1/itineraries/{id}:
    get:
      summary: Get itinerary by ID
      tags: [Itineraries]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Itinerary'
              example:
                itinerary_id: 00000000-0000-0000-0000-000000000700
                user_id: 00000000-0000-0000-0000-000000000001
                title: Test Itinerary
                description: Test itinerary description
                items:
                  - item_id: 00000000-0000-0000-0000-000000000701
                    itinerary_id: 00000000-0000-0000-0000-000000000700
                    day_number: 1
                    activity_name: Arrival
  /api/v1/itineraries/{id}/items:
    post:
      summary: Add itinerary item
      tags: [Itineraries]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItineraryItem'
            example:
              day_number: 1
              activity_name: Arrival and check-in
              activity_description: Check in and rest
              start_time: 09:00
              end_time: 12:00
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItineraryItem'
              example:
                item_id: 00000000-0000-0000-0000-000000000701
                itinerary_id: 00000000-0000-0000-0000-000000000700
                day_number: 1
                activity_name: Arrival and check-in
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid itinerary item
    patch:
      summary: Update itinerary item
      tags: [Itineraries]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItineraryItemRequest'
            example:
              item_id: 00000000-0000-0000-0000-000000000701
              activity_name: Updated activity name
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItineraryItem'
              example:
                item_id: 00000000-0000-0000-0000-000000000701
                itinerary_id: 00000000-0000-0000-0000-000000000700
                day_number: 1
                activity_name: Updated activity name
  /api/v1/intelligence/visa:
    get:
      summary: Get visa requirements
      tags: [Intelligence]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: source_country_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: destination_country_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisaRequirement'
              example:
                visa_id: 00000000-0000-0000-0000-000000000800
                source_country_id: 00000000-0000-0000-0000-000000000200
                destination_country_id: 00000000-0000-0000-0000-000000000201
                visa_type: required
                description: Visa required for travel
                cost_usd: 50
                valid_days: 30
                last_updated: "2026-03-14T10:00:00Z"
  /api/v1/intelligence/safety:
    get:
      summary: Get safety alerts
      tags: [Intelligence]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: country_id
          schema:
            type: string
            format: uuid
        - in: query
          name: min_level
          schema:
            type: integer
        - in: query
          name: max_level
          schema:
            type: integer
        - in: query
          name: active_only
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafetyAlertsResponse'
              example:
                data:
                  - alert_id: 00000000-0000-0000-0000-000000000810
                    country_id: 00000000-0000-0000-0000-000000000200
                    destination_id: 00000000-0000-0000-0000-000000000100
                    level: 2
                    message: Exercise caution in crowded areas
                    source_url: https://example.com/advisory
                    created_at: "2026-03-14T10:00:00Z"
                    valid_until: "2026-04-14T10:00:00Z"
                total: 1
