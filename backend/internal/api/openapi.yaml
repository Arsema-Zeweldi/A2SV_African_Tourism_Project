openapi: 3.0.3
info:
  title: Africa Tourism Platform API
  version: 1.0.0
  description: API documentation for the Africa Tourism Platform backend.
servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://africa-tourism-backend.onrender.com
    description: Production server
tags:
  - name: Health
    description: Service health and readiness
  - name: Auth
    description: Authentication and JWT issuance
  - name: User
    description: User profile and preferences
  - name: Packages
    description: Community packages
  - name: Reviews
    description: Package reviews and ratings
  - name: Chat
    description: Package chat
  - name: Itineraries
    description: Itinerary CRUD and items
  - name: Planner
    description: AI itinerary generation
  - name: Community
    description: Social feed and interactions
  - name: Upload
    description: ⚠️ BACKEND TEST ONLY - Direct file uploads (Frontend should use resource-specific multipart endpoints)
paths:
  /api/v1/health:
    get:
      summary: API V1 health check
      tags: [Health]
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy
                database: connected
                version: 1.0.0
  /api/v1/auth/register:
    post:
      summary: Register user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: user@example.com
              password: StrongPass123
              first_name: Test
              last_name: User
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              example:
                message: User registered successfully
                user_id: 00000000-0000-0000-0000-000000000001
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid request
  /api/v1/auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: user@example.com
              password: StrongPass123
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                user:
                  id: 00000000-0000-0000-0000-000000000001
                  email: user@example.com
        '401':
          description: Unauthorized
  /api/v1/auth/verify-email:
    get:
      summary: "[BROWSER REDIRECT] Verify user email"
      description: |
        **THIS IS NOT A JSON API.** This endpoint is intended for the browser's direct address bar. 
        When a user clicks the button in their email, they hit this link. 
        The backend performs the verification and then redirects to the frontend URL (e.g., `http://localhost:3000/login?verified=true`).
      tags: [Auth]
      parameters:
        - in: query
          name: token
          schema:
            type: string
          required: true
          description: The verification token sent via email
      responses:
        '302':
          description: Redirects to Frontend login page with `?verified=true`
  /api/v1/auth/resend-verification:
    post:
      summary: Resend verification email
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Verification email sent
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: User with this email does not exist
  /api/v1/auth/forgot-password:
    post:
      summary: Request a password reset password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset link sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: A reset link has been sent to your email
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: User with this email does not exist
  /api/v1/auth/reset-password:
    post:
      summary: Reset password via email token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
  /api/v1/auth/logout:
    post:
      summary: Invalidate the current session token
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out successfully
  /api/v1/user/change-password:
    post:
      summary: Change password while logged in
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
        '400':
          description: Validation error or passwords do not match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: new passwords do not match
        '401':
          description: Current password is incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Current password is incorrect
  /api/v1/upload/image:
    post:
      summary: "🔒 [INTERNAL] Upload an image (Backend Test Only)"
      description: |
        **Note to Frontend:** Do not use this endpoint directly for Packages, Posts, or Profile updates. 
        Instead, use the multipart support on the respective `POST /packages`, `POST /posts`, or `PATCH /profile` endpoints.
      tags: [Upload]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: folder
          schema:
            type: string
          description: Target folder (e.g., packages, profiles, posts)
          example: packages
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file (max 10MB)
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: url
              example:
                url: https://res.cloudinary.com/demo/image/upload/v12345/africa-tourism/packages/sample.jpg
        '400':
          description: Invalid file or too large
  /api/v1/upload/video:
    post:
      summary: "🔒 [INTERNAL] Upload a video (Backend Test Only)"
      description: |
        **Note to Frontend:** Do not use this endpoint directly for Community posts. 
        Instead, use the multipart support on the `POST /posts` endpoint.
      tags: [Upload]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: folder
          schema:
            type: string
          description: Target folder (e.g., posts)
          example: posts
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Video file (max 100MB)
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: url
              example:
                url: https://res.cloudinary.com/demo/video/upload/v12345/africa-tourism/posts/sample.mp4
        '400':
          description: Invalid file or too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid email or password
  /api/v1/packages/me:
    get:
      summary: Get my packages
      description: Returns a list of packages created by the authenticated user.
      tags: [Packages]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search through your own packages
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: page_size
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackagesFeedResponse'
  /api/v1/packages:
    get:
      summary: Get packages feed
      tags: [Packages]
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Robust search query. Matches title, summary, country, location, and category.
        - in: query
          name: status
          schema:
            type: string
            enum: [public, private, archived, all]
        - in: query
          name: sort_by
          schema:
            type: string
            enum: [rating_avg, price, verified, views]
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: page_size
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackagesFeedResponse'
              example:
                data:
                  - package_id: 00000000-0000-0000-0000-000000000500
                    creator_id: 00000000-0000-0000-0000-000000000001
                    itinerary_id: 00000000-0000-0000-0000-000000000700
                    title: Safari Adventure
                    summary: A 3-day guided safari
                    price: 299.99
                    status: public
                    rating_avg: 4.8
                    reviews_count: 10
                    views_count: 120
                    country: Kenya
                    location: Nairobi
                    currency: USD
                    image_url: https://example.com/safari.jpg
                    duration_days: 3
                    category: adventure
                    group_size: small
                    created_at: "2026-03-14T10:00:00Z"
                meta:
                  page: 1
                  page_size: 20
                  total: 1
                  sort_by: rating_avg
                  order: desc
    post:
      summary: Create package
      tags: [Packages]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackageCreateRequest'
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/PackageCreateRequest'
                - type: object
                  properties:
                    image:
                      type: string
                      format: binary
                      description: Optional package thumbnail image
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Package'
              example:
                package_id: 00000000-0000-0000-0000-000000000500
                creator_id: 00000000-0000-0000-0000-000000000001
                itinerary_id: 00000000-0000-0000-0000-000000000700
                title: Safari Adventure
                summary: A 3-day guided safari
                price: 299.99
                status: private
                rating_avg: 0
                reviews_count: 0
                views_count: 0
                country: Kenya
                location: Nairobi
                currency: USD
                image_url: https://example.com/safari.jpg
                duration_days: 3
                category: adventure
                created_at: "2026-03-14T10:00:00Z"
  /api/v1/packages/{id}:
    get:
      summary: Get package by ID
      tags: [Packages]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Package'
              example:
                package_id: 00000000-0000-0000-0000-000000000500
                creator_id: 00000000-0000-0000-0000-000000000001
                itinerary_id: 00000000-0000-0000-0000-000000000700
                title: Safari Adventure
                summary: A 3-day guided safari
                price: 299.99
                status: public
                rating_avg: 4.8
                reviews_count: 10
                views_count: 121
                country: Kenya
                location: Nairobi
                currency: USD
                image_url: https://example.com/safari.jpg
                duration_days: 3
                category: adventure
                created_at: "2026-03-14T10:00:00Z"
    patch:
      summary: Update package
      tags: [Packages]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackageUpdateRequest'
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/PackageUpdateRequest'
                - type: object
                  properties:
                    image:
                      type: string
                      format: binary
                      description: Optional new package thumbnail image
      responses:
        '200':
          description: Package updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  package_id:
                    type: string
                    format: uuid
              example:
                message: Package updated successfully
                package_id: 00000000-0000-0000-0000-000000000500
                country: Kenya
                location: Nairobi
                currency: USD
                image_url: https://example.com/safari.jpg
                duration_days: 3
                category: adventure
                created_at: "2026-03-14T10:00:00Z"
    delete:
      summary: Archive package
      tags: [Packages]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Package archived successfully
  /api/v1/packages/{id}/status:
    patch:
      summary: Update package status
      tags: [Packages]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackageStatusRequest'
            example:
              status: public
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Status updated successfully
  /api/v1/packages/{id}/reviews:
    get:
      summary: Get package reviews
      tags: [Reviews]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageReviewsResponse'
              example:
                data:
                  - review_id: 00000000-0000-0000-0000-000000000900
                    package_id: 00000000-0000-0000-0000-000000000500
                    user_id: 00000000-0000-0000-0000-000000000001
                    rating: 5
                    comment: Great trip!
                    created_at: "2026-03-14T10:00:00Z"
                meta:
                  total: 1
                  page: 1
                  page_size: 50
    post:
      summary: Submit package review
      tags: [Reviews]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequest'
            example:
              rating: 5
              comment: Great trip
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Review submitted successfully
  /api/v1/packages/{id}/reviews/{reviewId}:
    delete:
      summary: Delete a review (author only)
      tags: [Reviews]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: reviewId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Review deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Review deleted successfully
  /api/v1/packages/{id}/chat:
    get:
      summary: Get package chat history
      tags: [Chat]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatHistoryResponse'
              example:
                data:
                  - chat_id: 00000000-0000-0000-0000-000000001000
                    package_id: 00000000-0000-0000-0000-000000000500
                    user_id: 00000000-0000-0000-0000-000000000001
                    message: Is transport included?
                    created_at: "2026-03-14T10:00:00Z"
                meta:
                  page: 1
                  page_size: 50
                  total: 1
    post:
      summary: Post chat message
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            example:
              message: Is transport included?
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageChat'
              example:
                chat_id: 00000000-0000-0000-0000-000000001000
                package_id: 00000000-0000-0000-0000-000000000500
                user_id: 00000000-0000-0000-0000-000000000001
                message: Is transport included?
                created_at: "2026-03-14T10:00:00Z"
  /api/v1/user/profile:
    get:
      summary: Get user profile
      tags: [User]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserProfileResponse'
              example:
                data:
                  user_id: 00000000-0000-0000-0000-000000000001
                  email: user@example.com
                  first_name: Yihenew
                  last_name: Amogne
                  country: Ethiopia
                  bio: Passionate traveler and developer.
                  avatar_url: https://example.com/avatar.jpg
                  created_at: 2026-03-14T10:00:00Z
    patch:
      summary: Update user profile
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/UpdateProfileRequest'
                - type: object
                  properties:
                    avatar:
                      type: string
                      format: binary
                      description: Optional user avatar image
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/UserProfileResponse'
              example:
                message: Profile updated
                data:
                  user_id: 00000000-0000-0000-0000-000000000001
                  email: user@example.com
                  first_name: Arsema
                  last_name: Zeweldi
                  country: Ethiopia
                  bio: Updated bio.
                  avatar_url: https://example.com/avatar.jpg
                  created_at: 2026-03-14T10:00:00Z
  /api/v1/user/preferences:
    get:
      summary: Get user preferences
      tags: [User]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferencesResponse'
              example:
                data:
                  preference_id: 00000000-0000-0000-0000-000000000300
                  user_id: 00000000-0000-0000-0000-000000000001
                  preferred_season: summer
                  budget_range: medium
                  preferred_activities: [hiking, food]
                  dietary_restrictions: [vegetarian]
                  preferred_climate: tropical
                  preferred_language: english
                  travel_vibe_interest: adventure
    patch:
      summary: Update user preferences
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                preferred_season:
                  type: string
                  description: "Allowed values: `spring`, `summer`, `autumn`, `winter`, `any`"
                  enum: [spring, summer, autumn, winter, any]
                budget_range:
                  type: string
                  description: "Allowed values: `low`, `medium`, `high`, `luxury`"
                  enum: [low, medium, high, luxury]
                preferred_activities:
                  type: array
                  description: "Free text tags for activities you enjoy (e.g. hiking, museums, food)"
                  items:
                    type: string
                dietary_restrictions:
                  type: array
                  description: "Optional list of dietary constraints (e.g. vegan, gluten-free)"
                  items:
                    type: string
                preferred_climate:
                  type: string
                  description: "Allowed values: `tropical`, `desert`, `coastal`, `highland`, `temperate`, `any`"
                  enum: [tropical, desert, coastal, highland, temperate, any]
                preferred_language:
                  type: string
                  description: "Allowed values: `english`, `french`, `arabic`, `portuguese`, `swahili`, `any`"
                  enum: [english, french, arabic, portuguese, swahili, any]
                travel_vibe_interest:
                  type: string
                  description: "Primary travel style. Allowed values: `adventure`, `relaxed`, `foodie`, `history`, `party`, `culture`, `wildlife`, `any`"
                  enum: [adventure, relaxed, foodie, history, party, culture, wildlife, any]
                travel_vibes:
                  type: array
                  description: "List of vibes. Note: Currently the server may use the first element of this array to update travel_vibe_interest. Use values from the same enum: `adventure`, `relaxed`, `foodie`, `history`, `party`, `culture`, `wildlife`, `any`"
                  items:
                    type: string
                    enum: [adventure, relaxed, foodie, history, party, culture, wildlife, any]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Preferences updated
  /api/v1/planner/generate:
    post:
      summary: Generate itinerary using AI
      description: "**Note**: The generated itinerary is NOT automatically saved. To persist it, users must explicitly save the returned `data` object by sending it as a payload to the `POST /api/v1/itineraries` endpoint."
      tags: [Planner]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePlanRequest'
            example:
              destination: Nairobi, Kenya
              duration_days: 3
              budget_level: medium
              vibe_tags: [culture, food]
              group_size: 2
              climate_pref: any
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratePlanResponse'
              example:
                message: Plan generated
                data:
                  title: Nairobi Highlights
                  description: A 3-day cultural tour
                  days_count: 3
                  nights_count: 2
                  activities:
                    - day_number: 1
                      order_index: 0
                      title: City tour
                      activity_type: culture
                      description: Explore downtown
                      cost_label: $50
                      latitude: -1.286389
                      longitude: 36.817223
                      ai_pick: true
  /api/v1/planner/activity-chat:
    post:
      summary: Chat about a specific activity
      description: |
        Allows users to ask specific questions about an activity in their itinerary (e.g., "Is it safe for kids?", "What should I wear?").
        The AI uses the provided activity details to give context-aware answers.
      tags: [Planner]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityChatRequest'
            example:
              activity_title: "Giraffe Centre Visit"
              activity_description: "Feeding giraffes at the sanctuary"
