  /api/v1/posts:
    get:
      summary: List community posts
      tags: [Community]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [public, private, archived, all]
          description: Filter posts by status
        - in: query
          name: user_id
          schema:
            type: string
            format: uuid
          description: Filter posts by a specific user ID
        - in: query
          name: q
          schema:
            type: string
          description: Search posts by content, location, or package name
        - in: query
          name: sort_by
          schema:
            type: string
            enum: [created_at, likes_count, comments_count]
          description: Field to sort by
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
          description: Sort order
        - in: query
          name: page
          schema:
            type: integer
          description: Page number
        - in: query
          name: page_size
          schema:
            type: integer
          description: Number of items per page
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PostResponse'
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      page_size:
                        type: integer
                      total:
                        type: integer
    post:
      summary: Create community post
      tags: [Community]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/CreatePostRequest'
                - type: object
                  properties:
                    media:
                      type: string
                      format: binary
                      description: Optional media (image or video) for the post
      responses:
        '201':
          description: Created successfully. Returns the full post object with author details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
              example:
                post_id: "00000000-0000-0000-0000-000000002000"
                user_id: "00000000-0000-0000-0000-000000000001"
                user_name: "Arsema Zeweldi"
                user_avatar: "https://example.com/avatar.jpg"
                content: "My amazing trip to Kenya!"
                media_url: "https://res.cloudinary.com/demo/image/upload/v1/posts/safari.jpg"
                media_type: "image"
                location: "Nairobi, Kenya"
                package_name: "Safari Adventure"
                likes_count: 0
                comments_count: 0
                created_at: "2026-03-14T10:00:00Z"
  /api/v1/posts/{id}:
    get:
      summary: Get a single community post
      description: Returns a single post by ID, including populated author names and avatars.
      tags: [Community]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '404':
          description: Post not found
  /api/v1/posts/{id}/like:
    post:
      summary: 🔒 Toggle like on a post
      description: |
        Toggles a like for the authenticated user. 
        - If the user hasn't liked the post: Creates a like and increments `likes_count`.
        - If the user has already liked the post: Removes the like and decrements `likes_count`.
      tags: [Community]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  liked:
                    type: boolean
              example:
                message: "Post liked"
                liked: true
  /api/v1/posts/{id}/comments:
    get:
      summary: List comments for a post
      tags: [Community]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommentResponse'
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      page_size:
                        type: integer
                      total:
                        type: integer
    post:
      summary: Add comment to a post
      tags: [Community]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
  /api/v1/posts/comments/{commentId}:
    delete:
      summary: 🔒 Delete a comment
      description: |
        Allows a user to delete their own comment. 
        Backend verifies ownership; returns 403 if the user is not the author.
      tags: [Community]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: commentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Comment deleted successfully
        '403':
          description: Unauthorized to delete this comment
        '404':
          description: Comment not found
