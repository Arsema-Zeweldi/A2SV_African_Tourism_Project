          description: |
            Optional direct link to an image/video. 
            Note: If you use the multipart form to upload a 'media' file, this field will be ignored and replaced by the uploaded file's URL.
        media_type:
          type: string
          description: "Optional type hint. Use 'image' or 'video'. If not specified, the server will try to detect it from the file extension or URL."
          example: "image"
        location:
          type: string
          description: "Optional location tag."
          example: "Cape Town, South Africa"
        package_name:
          type: string
          description: "Optional reference to a tourism package."
          example: "South Africa Coastal Tour"
        tags:
          type: array
          items:
            type: string
          example: ["nature", "sunset", "travel"]
